version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# MCP Infrastructure Stack
#   - Jenkins   : http://localhost:8080
#   - Netbox    : http://localhost:8000
#   - Vault     : http://localhost:8200  (dev mode, token = root)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Jenkins ─────────────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts
    container_name: mcp-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_cache:/var/jenkins_home/terraform-plugin-cache
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - mcp-net

  # ── Netbox — PostgreSQL ──────────────────────────────────────────────────────
  netbox-db:
    image: postgres:15-alpine
    container_name: mcp-netbox-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox-pass
    volumes:
      - netbox_db:/var/lib/postgresql/data
    networks:
      - mcp-net

  # ── Netbox — Redis ───────────────────────────────────────────────────────────
  netbox-redis:
    image: redis:7-alpine
    container_name: mcp-netbox-redis
    restart: unless-stopped
    networks:
      - mcp-net

  # ── Netbox — App ─────────────────────────────────────────────────────────────
  netbox:
    image: netboxcommunity/netbox:latest
    container_name: mcp-netbox
    restart: unless-stopped
    depends_on:
      - netbox-db
      - netbox-redis
    ports:
      - "8000:8080"
    environment:
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@mcp-infra.local
      SUPERUSER_PASSWORD: admin123
      SUPERUSER_API_TOKEN: netbox-mcp-api-token-000001
      DB_HOST: netbox-db
      DB_PORT: "5432"
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox-pass
      REDIS_HOST: netbox-redis
      REDIS_PORT: "6379"
      SECRET_KEY: "mcp-infra-netbox-secret-key-change-in-production-abc123xyz"
      ALLOWED_HOSTS: "*"
      SKIP_SUPERUSER: "false"
    volumes:
      - netbox_media:/opt/netbox/netbox/media
      - ./netbox-config/extra.py:/etc/netbox/config/extra.py:ro
    networks:
      - mcp-net

  # ── HashiCorp Vault (dev mode — token = root) ────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    container_name: mcp-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DISABLE_MLOCK: "true"
      SKIP_SETCAP: "true"
    entrypoint: vault
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    networks:
      - mcp-net

volumes:
  jenkins_home:
  jenkins_cache:
  netbox_db:
  netbox_media:

networks:
  mcp-net:
    driver: bridge
